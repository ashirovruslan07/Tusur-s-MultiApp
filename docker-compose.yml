name: multiapp

services:
  multiapp:
    build: .
    container_name: multiapp
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://multiapp:multiapp@postgres:5432/multiapp
      MULTIAPP_DB_PATH: /app/data/multi_app.sqlite
      MULTIAPP_TIMEZONE: Asia/Tomsk
      TZ: Asia/Tomsk
    volumes:
      - multiapp-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: multiapp-postgres
    environment:
      POSTGRES_DB: multiapp
      POSTGRES_USER: multiapp
      POSTGRES_PASSWORD: multiapp
      TZ: Asia/Tomsk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multiapp -d multiapp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  tests:
    build: .
    working_dir: /app
    environment:
      MULTIAPP_DB_PATH: /tmp/multiapp_test.sqlite
      MULTIAPP_TIMEZONE: Asia/Tomsk
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_ROOT_USER_ACTION: ignore
      PYTHONPATH: /app
      TZ: Asia/Tomsk
    volumes:
      - .:/app
    entrypoint: ["sh", "-c", "pip install -r requirements-dev.txt >/dev/null && exec \"$@\"", "--"]
    command: ["pytest"]
    profiles:
      - tests

volumes:
  multiapp-data:
  postgres-data:
